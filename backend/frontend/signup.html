<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AeroGuard AI</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            overflow: hidden;
            background: #111;
        }

        .bg-img-wrapper {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            transition: transform 0.1s ease-out;
            will-change: transform;
            z-index: 0;
        }

        .bg-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .content-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-form {
            width: 400px;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: white;
            text-decoration: none;
            font-weight: bold;
            z-index: 10;
        }

        .back-link:hover {
            color: var(--primary-orange);
        }

        .auth-message {
            text-align: center;
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }

        .auth-message.error {
            display: block;
            background: rgba(255, 60, 60, 0.15);
            border: 1px solid rgba(255, 60, 60, 0.4);
            color: #ff6b6b;
        }

        .auth-message.success {
            display: block;
            background: rgba(0, 200, 100, 0.15);
            border: 1px solid rgba(0, 200, 100, 0.4);
            color: #4dff91;
        }

        .btn-orange:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <a href="/" class="back-link">&larr; Back to Home</a>

    <div class="bg-img-wrapper" id="jet-bg">
        <img src="/orange_jet.png" alt="Jet Engine">
    </div>
    <div class="overlay"></div>

    <div class="content-container">
        <div class="card glass-form">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary-orange);">New Operator</h2>
            <form id="signup-form">
                <div style="margin-bottom: 1rem;">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" style="width: 100%;" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="user@example.com" style="width: 100%;" required>
                </div>
                <div style="margin-bottom: 2rem;">
                    <label>Set Passkey</label>
                    <input type="password" id="signup-password"
                        placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" style="width: 100%;"
                        required minlength="6">
                </div>
                <button type="submit" id="signup-btn" class="btn-orange" style="width: 100%;">Initialize
                    Account</button>
            </form>
            <div id="auth-message" class="auth-message"></div>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
                Already have access? <a href="/login.html"
                    style="color: var(--primary-orange); text-decoration: none;">Login</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        // 3D Parallax
        var jetBg = document.getElementById('jet-bg');
        document.addEventListener('mousemove', function (e) {
            var xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            var yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            jetBg.style.transform = 'scale(1.1) rotateY(' + xAxis + 'deg) rotateX(' + yAxis + 'deg) translateZ(10px)';
        });

        // Supabase init - inline to avoid any loading order issues
        var SUPABASE_URL = 'https://ensedxerykbjxnzenabl.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc2VkeGVyeWtianhuemVuYWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3NzYzNzIsImV4cCI6MjA4NjM1MjM3Mn0.6g0u3qviXkmhBCfHgwBcVDd2UbvHXYyZKYB5N_QBK1c';
        var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        var signupForm = document.getElementById('signup-form');
        var signupBtn = document.getElementById('signup-btn');
        var authMessage = document.getElementById('auth-message');

        function showMessage(text, type) {
            authMessage.innerHTML = text;
            authMessage.className = 'auth-message ' + type;
        }

        signupForm.addEventListener('submit', function (e) {
            e.preventDefault();
            signupBtn.disabled = true;
            signupBtn.textContent = 'Initializing...';
            authMessage.className = 'auth-message';

            var name = document.getElementById('signup-name').value.trim();
            var email = document.getElementById('signup-email').value.trim();
            var password = document.getElementById('signup-password').value;

            sb.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: name
                    }
                }
            }).then(function (response) {
                var data = response.data;
                var error = response.error;

                if (error) {
                    showMessage(error.message, 'error');
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'Initialize Account';
                } else if (data.user && data.user.identities && data.user.identities.length === 0) {
                    showMessage('An account with this email already exists.', 'error');
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'Initialize Account';
                } else {
                    // Hide form, show confirmation message
                    signupForm.style.display = 'none';
                    showMessage(
                        '<strong style="font-size:1.1rem;">&#9989; Account Created!</strong><br><br>' +
                        'A confirmation link has been sent to <strong>' + email + '</strong>.<br><br>' +
                        'Please check your inbox (and spam folder) and click the link to verify your account, then ' +
                        '<a href="/login.html" style="color:var(--primary-orange);text-decoration:underline;">Login here</a>.',
                        'success'
                    );
                }
            }).catch(function (err) {
                showMessage('Error: ' + err.message, 'error');
                signupBtn.disabled = false;
                signupBtn.textContent = 'Initialize Account';
            });
        });
    </script>
</body>

</html>

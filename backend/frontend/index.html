<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroGuard AI - Initialize</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            overflow: hidden;
            background: #111;
        }

        .landing-container {
            perspective: 1000px;
            overflow: hidden;
        }

        .bg-img-wrapper {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .bg-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .landing-content {
            transform: translateZ(50px);
            pointer-events: none;
        }

        .btn-orange {
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>
    <div class="landing-container" id="scene">
        <nav class="landing-nav" id="main-nav">
            <a href="/dashboard.html" class="nav-link" style="color: var(--primary-orange);">Dashboard</a>
            <a href="/about.html" class="nav-link">About Us</a>
            <a href="/contact.html" class="nav-link">Contact</a>
            <a href="/login.html" class="nav-link" id="nav-login">Login</a>
            <a href="/signup.html" class="nav-link" id="nav-signup"
                style="color: var(--primary-orange); border: 1px solid var(--primary-orange); padding: 0.5rem 1rem; border-radius: 4px;">Sign
                In</a>
            <a href="#" class="nav-link" id="nav-logout"
                style="display: none; color: #ccc; border: 1px solid rgba(255,255,255,0.15); padding: 0.5rem 1rem; border-radius: 4px;">Logout</a>
        </nav>

        <div class="bg-img-wrapper" id="jet-image">
            <img src="/orange_jet.png" alt="Jet Engine">
        </div>

        <div class="landing-overlay"></div>

        <div class="landing-content">
            <h1>AeroGuard AI</h1>
            <p>Predictive Maintenance System</p>
            <a href="/dashboard.html" class="btn-orange">Go to Dashboard</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        // 3D Parallax
        var container = document.getElementById('scene');
        var jet = document.getElementById('jet-image');

        document.addEventListener('mousemove', function (e) {
            var xAxis = (window.innerWidth / 2 - e.pageX) / 30;
            var yAxis = (window.innerHeight / 2 - e.pageY) / 30;
            jet.style.transform = 'scale(1.1) rotateY(' + xAxis + 'deg) rotateX(' + yAxis + 'deg) translateZ(10px)';
        });

        document.addEventListener('mouseleave', function () {
            jet.style.transform = 'scale(1.1) rotateY(0deg) rotateX(0deg) translateZ(0px)';
        });

        // Supabase init
        var SUPABASE_URL = 'https://ensedxerykbjxnzenabl.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc2VkeGVyeWtianhuemVuYWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3NzYzNzIsImV4cCI6MjA4NjM1MjM3Mn0.6g0u3qviXkmhBCfHgwBcVDd2UbvHXYyZKYB5N_QBK1c';
        var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Auth-aware nav
        sb.auth.getSession().then(function (res) {
            if (res.data.session) {
                document.getElementById('nav-login').style.display = 'none';
                document.getElementById('nav-signup').style.display = 'none';
                document.getElementById('nav-logout').style.display = 'inline-block';
            }
        });

        // Logout
        document.getElementById('nav-logout').addEventListener('click', function (e) {
            e.preventDefault();
            sb.auth.signOut().then(function () {
                window.location.reload();
            });
        });
    </script>
</body>

</html>

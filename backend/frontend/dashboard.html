<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            overflow-x: hidden;
            background: #111;
        }

        .dashboard-wrapper {
            position: relative;
            min-height: 100vh;
            perspective: 1000px;
            overflow: hidden;
        }

        .bg-img-wrapper {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            transition: transform 0.1s ease-out;
            will-change: transform;
            z-index: 0;
        }

        .bg-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dashboard-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .dashboard-container {
            position: relative;
            z-index: 2;
            padding-top: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 102, 0, 0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #ccc;
        }

        .user-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4dff91;
            box-shadow: 0 0 6px rgba(77, 255, 145, 0.5);
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ccc;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-logout:hover {
            background: rgba(255, 60, 60, 0.2);
            border-color: rgba(255, 60, 60, 0.4);
            color: #ff6b6b;
        }

        .auth-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-orange);
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div id="auth-loading" class="auth-loading">
        <span>Verifying clearance...</span>
    </div>

    <div class="dashboard-wrapper" style="visibility: hidden;" id="dashboard-main">
        <div class="bg-img-wrapper" id="jet-bg">
            <img src="/orange_jet.png" alt="Jet Engine">
        </div>
        <div class="dashboard-overlay"></div>

        <div class="dashboard-container">
            <header
                style="background: transparent; border: none; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 style="color: white; margin: 0;">AeroGuard <span style="color:var(--primary-orange)">AI</span>
                    </h2>
                </div>

                <div class="header-actions" style="display: flex; gap: 1rem; align-items: center;">
                    <div class="user-badge">
                        <span class="dot"></span>
                        <span id="user-email">operator</span>
                    </div>

                    <button id="demo-btn" class="btn-orange" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Auto
                        Demo</button>

                    <div class="dropdown">
                        <button class="btn-orange" onclick="toggleDropdown()"
                            style="background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; font-size: 0.9rem;">System
                            Details &#9662;</button>
                        <div id="myDropdown" class="dropdown-content"
                            style="background: #222; color: white; border-top: 2px solid #ff6600;">
                            <h3 style="color:white; font-size: 1rem;">Model Stats</h3>
                            <p style="color:#ccc; font-size: 0.9rem;">Accuracy: ~70%</p>
                            <hr style="border-color: #444;">
                            <p style="color:#ccc; font-size: 0.9rem;">RUL Thresholds: 60/30</p>
                        </div>
                    </div>

                    <button id="logout-btn" class="btn-logout">Logout</button>
                </div>
            </header>

            <div class="main-grid" style="display: grid; grid-template-columns: 350px 1fr; gap: 2rem;">
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem; color: var(--primary-orange);">Sensor Configuration</h3>
                    <form id="prediction-form">
                        <div style="margin-bottom: 1rem;">
                            <label>Fan Speed (S2)</label>
                            <input type="number" step="0.01" name="s_2" value="642.15" required
                                style="width: 100%; padding: 10px; border-radius: 4px;">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label>Core Speed (S3)</label>
                            <input type="number" step="0.01" name="s_3" value="1590.00" required
                                style="width: 100%; padding: 10px; border-radius: 4px;">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label>HPC Temp (S11)</label>
                            <input type="number" step="0.01" name="s_11" value="47.50" required
                                style="width: 100%; padding: 10px; border-radius: 4px;">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label>LPT Temp (S14)</label>
                            <input type="number" step="0.01" name="s_14" value="8140.00" required
                                style="width: 100%; padding: 10px; border-radius: 4px;">
                        </div>
                        <button type="submit" class="btn-orange" style="width: 100%; margin-top: 1rem;">Run
                            Analysis</button>
                    </form>
                </div>

                <div class="card" style="display: flex; flex-direction: column; align-items: center;">
                    <h3 style="margin-bottom: 1rem;">Engine Status</h3>
                    <div style="position: relative; height: 250px; width: 250px;">
                        <canvas id="healthGauge"></canvas>
                        <div
                            style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -20%); text-align: center;">
                            <span id="health-text"
                                style="font-size: 2.5rem; font-weight: bold; display: block; color: white;">--%</span>
                        </div>
                    </div>
                    <div
                        style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; width: 100%; margin-top: 2rem;">
                        <div class="stat-box">
                            <div id="rul-value" class="stat-val">--</div>
                            <div class="stat-label" style="color: #ccc;">Predicted RUL</div>
                        </div>
                        <div class="stat-box">
                            <div id="rul-status" class="stat-val" style="font-size: 1.5rem; line-height: 3rem;">--</div>
                            <div class="stat-label" style="color: #ccc;">Condition</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        // Supabase init
        var SUPABASE_URL = 'https://ensedxerykbjxnzenabl.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuc2VkeGVyeWtianhuemVuYWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3NzYzNzIsImV4cCI6MjA4NjM1MjM3Mn0.6g0u3qviXkmhBCfHgwBcVDd2UbvHXYyZKYB5N_QBK1c';
        var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Auth guard
        sb.auth.getSession().then(function (res) {
            if (!res.data.session) {
                window.location.href = '/login.html';
                return;
            }
            document.getElementById('user-email').textContent = res.data.session.user.email;
            document.getElementById('auth-loading').style.display = 'none';
            document.getElementById('dashboard-main').style.visibility = 'visible';
        }).catch(function () {
            window.location.href = '/login.html';
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', function () {
            sb.auth.signOut().then(function () {
                window.location.href = '/';
            });
        });
    </script>

    <script src="/script.js"></script>
    <script>
        var jetBg = document.getElementById('jet-bg');
        document.addEventListener('mousemove', function (e) {
            var xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            var yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            jetBg.style.transform = 'scale(1.1) rotateY(' + xAxis + 'deg) rotateX(' + yAxis + 'deg) translateZ(5px)';
        });
    </script>
</body>

</html>

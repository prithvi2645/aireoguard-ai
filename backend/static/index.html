<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroGuard AI - Initialize</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            overflow: hidden;
            background: #111;
        }

        .landing-container {
            perspective: 1000px;
            overflow: hidden;
        }

        .bg-img-wrapper {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .bg-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .landing-content {
            transform: translateZ(50px);
            pointer-events: none;
        }

        .btn-orange {
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>
    <div class="landing-container" id="scene">
        <!-- Navigation -->
        <nav class="landing-nav">
            <a href="/dashboard.html" class="nav-link" style="color: var(--primary-orange);">Dashboard</a>
            <a href="/about.html" class="nav-link">About Us</a>
            <a href="/contact.html" class="nav-link">Contact</a>
            <a href="/login.html" class="nav-link">Login</a>
            <a href="/signup.html" class="nav-link"
                style="color: var(--primary-orange); border: 1px solid var(--primary-orange); padding: 0.5rem 1rem; border-radius: 4px;">Sign
                In</a>
        </nav>

        <!-- Full Screen Image Wrapper -->
        <div class="bg-img-wrapper" id="jet-image">
            <img src="/orange_jet.png" alt="Jet Engine">
        </div>

        <!-- Dark Overlay -->
        <div class="landing-overlay"></div>

        <div class="landing-content">
            <h1>AeroGuard AI</h1>
            <p>Predictive Maintenance System</p>
            <a href="/dashboard.html" class="btn-orange">Go to Dashboard</a>
        </div>
    </div>

    <script>
        const container = document.getElementById('scene');
        const jet = document.getElementById('jet-image');

        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 30;

            jet.style.transform = `scale(1.1) rotateY(${xAxis}deg) rotateX(${yAxis}deg) translateZ(10px)`;
        });

        document.addEventListener('mouseleave', () => {
            jet.style.transform = `scale(1.1) rotateY(0deg) rotateX(0deg) translateZ(0px)`;
        });
    </script>
</body>

</html>

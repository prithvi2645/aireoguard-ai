<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AeroGuard AI</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            overflow: hidden;
            background: #111;
        }

        .bg-img-wrapper {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            transition: transform 0.1s ease-out;
            will-change: transform;
            z-index: 0;
        }

        .bg-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .content-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-form {
            width: 500px;
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: white;
            text-decoration: none;
            font-weight: bold;
            z-index: 10;
        }

        .back-link:hover {
            color: var(--primary-orange);
        }
    </style>
</head>

<body>
    <a href="/" class="back-link">← Back to Home</a>

    <div class="bg-img-wrapper" id="jet-bg">
        <img src="/orange_jet.png" alt="Jet Engine">
    </div>
    <div class="overlay"></div>

    <div class="content-container">
        <div class="card glass-form">
            <h2 style="margin-bottom: 1.5rem; color: var(--primary-orange);">Establish Comms</h2>
            <form>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label>Name</label>
                        <input type="text" placeholder="Pilot..." style="width: 100%;">
                    </div>
                    <div>
                        <label>Department</label>
                        <input type="text" placeholder="Engineering" style="width: 100%;">
                    </div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label>Message Priority</label>
                    <input type="text" placeholder="Normal / High / Critical" style="width: 100%;">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label>Direct Message</label>
                    <textarea
                        style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 2px;"
                        rows="4"></textarea>
                </div>
                <button type="button" class="btn-orange" style="width: 100%;"
                    onclick="alert('Message Transmitted')">Transmit</button>
            </form>
        </div>
    </div>

    <script>
        const jetBg = document.getElementById('jet-bg');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            jetBg.style.transform = `scale(1.1) rotateY(${xAxis}deg) rotateX(${yAxis}deg) translateZ(10px)`;
        });
    </script>
</body>

</html>
